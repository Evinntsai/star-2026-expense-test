<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR 2026 報帳系統</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ─── Design tokens ─────────────────────────────────────── */
:root {
  --bg:#f3f1ed; --sf:#fff; --s2:#edeae3; --s3:#e2dfd7;
  --bd:#ccc8be; --bd2:#b8b4a8;
  --navy:#1b3457; --navy-l:#e8edf5;
  --green:#175c34; --green-l:#e5f2ea;
  --red:#7a1e1e; --red-l:#faeaea;
  --amber:#7a4f0e; --amber-l:#faf0e0;
  --r:8px; --rl:12px; --rxl:16px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 10px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:#17150f;font-size:13.5px;line-height:1.65}

/* ─── Auth screen ────────────────────────────────────────── */
#authScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(145deg, #0e1f3a 0%, #1b3558 60%, #2a5285 100%);
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.auth-card {
  background: #fff; border-radius: 20px;
  padding: 52px 44px 40px; width: 400px; text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,.35);
  animation: authIn .5s cubic-bezier(.22,.68,0,1.2) both;
}
@keyframes authIn { from { opacity:0; transform:translateY(24px) scale(.96); } to { opacity:1; transform:none; } }
.auth-rocket { font-size: 56px; display: block; margin-bottom: 18px; animation: hover 3s ease-in-out infinite; }
@keyframes hover { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.auth-title { font-size: 26px; font-weight: 700; color: var(--navy); letter-spacing: .5px; }
.auth-sub { font-size: 13px; color: #7a7870; margin: 6px 0 36px; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 13px 20px; border: 1.5px solid var(--bd2);
  border-radius: 10px; background: white; cursor: pointer;
  font-size: 14px; font-weight: 600; color: #17150f; transition: all .18s;
}
.google-btn:hover { background: var(--navy-l); border-color: var(--navy); transform: translateY(-1px); }

/* ─── App Shell ─────────────────────────────────────────── */
.app { display: flex; min-height: 100vh; }
.sb { width: 224px; background: var(--navy); color: #fff; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
.sb-logo { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,.1); font-weight: 800; font-size: 20px; }
.sb-user { display: flex; align-items: center; gap: 9px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sb-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff; color: var(--navy); font-weight: 700; font-size: 12px; }
.sb-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nb { display: flex; align-items: center; gap: 9px; padding: 10px 16px; width: 100%; border: none; background: none; color: rgba(255,255,255,.7); font-size: 13px; cursor: pointer; text-align: left; }
.nb.active { background: rgba(255,255,255,.15); color: #fff; font-weight: 700; }
.main { margin-left: 224px; flex: 1; padding: 26px 28px; }
.sec { display: none; }
.sec.active { display: block; }

/* ─── UI Components ───────────────────────────────────────── */
.card, .fsec { background: #fff; border: 1px solid var(--bd); border-radius: var(--rxl); padding: 20px; margin-bottom: 16px; box-shadow: var(--sh); }
.tw { overflow-x: auto; border: 1px solid var(--bd); border-radius: var(--rl); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--s2); padding: 10px; text-align: left; border-bottom: 1px solid var(--bd); }
td { padding: 10px; border-bottom: 1px solid #eeebe5; vertical-align: top; }
.btn { padding: 7px 12px; border-radius: 6px; cursor: pointer; border: 1.5px solid; font-weight: 600; font-size: 11px; display: inline-flex; align-items: center; gap: 5px; }
.btn-p { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn-g { background: var(--green); color: #fff; border-color: var(--green); }
.btn-r { background: transparent; color: var(--red); border-color: var(--red-l); }
.btn-s { background: transparent; color: #17150f; border-color: var(--bd2); }
.badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.b-red { background: var(--red-l); color: var(--red); }
.b-green { background: var(--green-l); color: var(--green); }

/* 狀態特殊樣式 */
.row-cancelled { opacity: 0.5; text-decoration: line-through; }
.row-failed { background-color: #fff5f5; color: var(--red); font-weight: 500; }
.payer-detail { background: #faf9f6; padding: 12px; margin-top: 8px; border-radius: 8px; border-left: 4px solid var(--navy); display: none; }
.steps { display: flex; gap: 4px; margin-top: 10px; }
.st-item { flex: 1; text-align: center; font-size: 9px; }
.st-circle { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--bd); margin: 0 auto 3px; display: flex; align-items: center; justify-content: center; }
.st-circle.done { background: var(--green); color: #fff; border-color: var(--green); }
.st-circle.active { background: var(--navy); color: #fff; border-color: var(--navy); }
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <span class="auth-rocket">🚀</span>
    <div class="auth-title">STAR 報帳系統</div>
    <div class="auth-sub">2026 年度財務管理平台 · 清華大學火箭團隊</div>
    <button class="google-btn" id="gLoginBtn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66 2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      以 Google 帳號登入
    </button>
    <div id="authErr" style="color:var(--red); font-size:12px; margin-top:10px; display:none"></div>
  </div>
</div>

<div class="app hidden" id="mainApp">
  <div class="sb">
    <div class="sb-logo">🚀 STAR 2026</div>
    <div class="sb-user"><div class="sb-av" id="sbAv">S</div><div id="sbName" style="font-size:12px;font-weight:600">—</div></div>
    <nav class="sb-nav">
      <button class="nb active" onclick="go('dashboard')">📊 帳本總覽</button>
      <button class="nb" onclick="go('entry')">✏️ 新增支出申請</button>
      <button class="nb" onclick="go('ledger')">📒 收支明細</button>
      <button class="nb" onclick="go('payers')">👤 代墊追蹤</button>
      <button class="nb" onclick="go('approval')">✅ 核銷審核</button>
      <button class="nb" onclick="go('report')">📄 財務報表</button>
    </nav>
    <button class="nb" onclick="signOut()" style="margin-top:auto;opacity:0.5">🚪 登出</button>
  </div>

  <div class="main">
    <div id="s-dashboard" class="sec active">
      <h2>帳本總覽</h2>
      <div id="dashMetrics" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:15px"></div>
    </div>

    <div id="s-entry" class="sec">
      <div class="fsec">
        <h3>📝 新增支出</h3><br>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label>購買日期</label><input type="date" id="e_date" style="width:100%"></div>
          <div><label>經費出處</label><select id="e_fund" onchange="toggleTax()" style="width:100%"><option>清大捐款總帳</option><option>現金帳</option><option>交大自主學習</option><option>清大共學圈圈</option></select></div>
          <div><label>統編</label><select id="e_taxid" style="width:100%"><option>清大統編46804804</option><option>交大統編87557573</option><option>無統編</option></select></div>
          <div><label>代墊人</label><input type="text" id="e_payer" style="width:100%"></div>
          <div style="grid-column:span 2"><label>摘要</label><input type="text" id="e_desc" style="width:100%"></div>
          <div><label>金額</label><input type="number" id="e_amount" style="width:100%"></div>
          <div><label>Drive 連結</label><input type="url" id="e_drive" style="width:100%"></div>
        </div>
        <button class="btn btn-p" style="margin-top:15px" onclick="submitEntry()">送出申請</button>
      </div>
    </div>

    <div id="s-ledger" class="sec">
      <h2>收支明細</h2>
      <div class="tw" style="margin-top:15px">
        <table>
          <thead><tr><th>購買日</th><th>摘要</th><th>金額</th><th>報帳日</th><th>核銷詳細狀態</th><th>操作</th></tr></thead>
          <tbody id="ledgerTbl"></tbody>
        </table>
      </div>
    </div>

    <div id="s-payers" class="sec"><h2>👤 代墊追蹤</h2><div id="payerList" style="margin-top:15px"></div></div>

    <div id="s-approval" class="sec">
      <div style="display:flex;justify-content:space-between"><h2>✅ 核銷審核</h2><button class="btn btn-g" onclick="bulkApprove()">批次簽名</button></div>
      <div id="apprList" style="margin-top:15px"></div>
    </div>

    <div id="s-report" class="sec"><h2>📄 財務報表</h2><div class="tw" style="margin-top:15px"><table><thead><tr><th>日期</th><th>摘要</th><th>金額</th><th>代墊人</th><th>帳戶</th><th>最後經手</th><th>核銷日</th></tr></thead><tbody id="rTbl"></tbody></table></div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc, collection, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQKMxa4ipTnLCzVonqFKi0MkAItAhIaAI",
  authDomain: "star-income-and-expenditure-t.firebaseapp.com",
  projectId: "star-income-and-expenditure-t",
  storageBucket: "star-income-and-expenditure-t.firebasestorage.app",
  messagingSenderId: "659587691506",
  appId: "1:659587691506:web:820f45f062767f6979716b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const STEPS_STD = ['隊內對帳','繳交資料','教授簽名','繳回系辦','校方撥款','財務放款'];
const STEPS_CL = ['發票鉛筆簽名','附上憑證黏存單','繳至行政單位'];

let currentUser = null, currentMember = null, allRecords = [];

// 登入綁定
document.getElementById('gLoginBtn').onclick = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { console.error(e); }
};

onAuthStateChanged(auth, async user => {
  if (!user) { document.getElementById('authScreen').style.display='flex'; return; }
  const snap = await getDoc(doc(db, 'members', user.email));
  if (!snap.exists() && user.email !== 'evelynnn.tsai@gmail.com') { alert("未授權"); fbSignOut(auth); return; }
  if (user.email === 'evelynnn.tsai@gmail.com' && !snap.exists()) await setDoc(doc(db,'members',user.email),{name:'Evelyn Tsai',role:'admin'});
  currentUser = user;
  currentMember = (await getDoc(doc(db,'members',user.email))).data();
  document.getElementById('authScreen').style.display='none';
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('sbName').textContent = currentMember.name;
  startListeners();
});

window.toggleTax = () => {
  const f = document.getElementById('e_fund').value, t = document.getElementById('e_taxid');
  if(f === '交大自主學習') t.value = '交大統編87557573';
  else t.value = '清大統編46804804';
};

window.submitEntry = async () => {
  const amt = Number(document.getElementById('e_amount').value);
  if(amt <= 0) return alert("金額須大於 0");
  await addDoc(collection(db, 'records'), {
    type:'expense', date: document.getElementById('e_date').value,
    fund: document.getElementById('e_fund').value, payer: document.getElementById('e_payer').value,
    desc: document.getElementById('e_desc').value, amount: amt, driveLink: document.getElementById('e_drive').value,
    step: 0, status: 'active', signs: {}, submittedAt: new Date().toISOString().split('T')[0],
    isCoLearn: (document.getElementById('e_fund').value.includes('學習') || document.getElementById('e_fund').value.includes('圈圈')),
    createdAt: serverTimestamp()
  });
  alert("申請成功"); go('dashboard');
};

// 功能：退回上一步
window.stepBack = async (id) => {
  const rec = allRecords.find(r => r.id === id);
  if (rec.step <= 0) return alert("已經在第一步了");
  if (!confirm("確定要退回上一步？這會移除最後一個簽名。")) return;
  const newSigns = { ...rec.signs };
  delete newSigns[rec.step - 1];
  await updateDoc(doc(db, 'records', id), { step: rec.step - 1, signs: newSigns });
};

// 功能：標記為無法核銷 (亮紅字但不扣款)
window.markFailed = async (id) => {
  if (!confirm("標記為『無法核銷』？這會結束流程但不會從帳戶扣除預算。")) return;
  await updateDoc(doc(db, 'records', id), { status: 'failed', lastSigner: currentMember.name, lastSignDate: new Date().toISOString().split('T')[0] });
};

// 功能：取消核銷 (紅字槓掉)
window.cancelRecord = async (id) => {
  if (!confirm("確定『取消整筆』？這會作廢此筆申請。")) return;
  await updateDoc(doc(db, 'records', id), { status: 'cancelled', cancelInfo: { name: currentMember.name, date: new Date().toISOString().split('T')[0] } });
};

window.nextStep = async (id, step) => {
  const rec = allRecords.find(r => r.id === id);
  const newSigns = { ...rec.signs };
  newSigns[step] = { name: currentMember.name, date: new Date().toISOString().split('T')[0] };
  await updateDoc(doc(db,'records',id), {
    step: step + 1, signs: newSigns, lastSigner: currentMember.name, lastSignDate: new Date().toISOString().split('T')[0]
  });
};

function startListeners() {
  onSnapshot(query(collection(db,'records'), orderBy('date','desc')), snap => {
    allRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });
}

function renderAll() {
  const exp = allRecords.filter(r => r.type === 'expense' && r.status === 'active');
  const total = exp.reduce((s, r) => s + r.amount, 0);
  document.getElementById('dashMetrics').innerHTML = `<div class="card"><h3>${exp.length}</h3><p>待核銷筆數</p></div><div class="card"><h3>NT$ ${total.toLocaleString()}</h3><p>預算占用額</p></div>`;

  document.getElementById('ledgerTbl').innerHTML = allRecords.map(r => {
    const isExp = r.type === 'expense', steps = r.isCoLearn ? STEPS_CL : STEPS_STD;
    const sigs = (isExp && r.signs) ? Object.entries(r.signs).map(([idx, d]) => `[${steps[idx]}: ${d.name}]`).join('<br>') : '-';
    let rowClass = r.status === 'cancelled' ? 'row-cancelled' : (r.status === 'failed' ? 'row-failed' : '');
    
    return `<tr class="${rowClass}">
      <td>${r.date}</td>
      <td>${r.desc}${r.status==='failed'?' (無法核銷 ❌)':''}</td>
      <td style="color:${isExp?'red':'green'}">${isExp?'-':'+'}${r.amount}</td>
      <td>${r.submittedAt || '-'}</td>
      <td style="font-size:10px">${sigs}</td>
      <td>
        ${isExp && r.status === 'active' ? `
          <button class="btn btn-s btn-xs" onclick="stepBack('${r.id}')">↩️ 退回</button>
          <button class="btn btn-r btn-xs" onclick="markFailed('${r.id}')">❌ 無法核銷</button>
          <button class="btn btn-r btn-xs" onclick="cancelRecord('${r.id}')">🗑 取消整筆</button>
        ` : '-'}
      </td>
    </tr>`;
  }).join('');

  // 代墊追蹤
  const map = {};
  exp.forEach(r => { if(!map[r.payer]) map[r.payer] = { total:0, items:[] }; map[r.payer].total += r.amount; map[r.payer].items.push(r); });
  document.getElementById('payerList').innerHTML = Object.entries(map).map(([name, d]) => `
    <div class="card">
      <div style="display:flex;justify-content:space-between"><strong>${name}</strong><span>代墊：NT$ ${d.total.toLocaleString()}</span><button class="btn btn-s btn-xs" onclick="this.parentElement.nextElementSibling.style.display = this.parentElement.nextElementSibling.style.display === 'block' ? 'none' : 'block'">查看清單</button></div>
      <div class="payer-detail">${d.items.map(i => `<div>• ${i.date} | ${i.desc} | NT$ ${i.amount}</div>`).join('')}</div>
    </div>`).join('');

  // 核銷審核
  document.getElementById('apprList').innerHTML = exp.map(r => {
    const steps = r.isCoLearn ? STEPS_CL : STEPS_STD;
    return `<div class="card">
      <input type="checkbox" class="bulk-check" data-id="${r.id}"> <strong>${r.desc}</strong>
      <p style="font-size:12px;opacity:0.7">${r.payer} | NT$ ${r.amount} | <a href="${r.driveLink}" target="_blank">證明</a></p>
      <div class="steps">${steps.map((s,i) => `<div class="st-item"><div class="st-circle ${i<r.step?'done':i===r.step?'active':''}">${i<r.step?'✓':i+1}</div>${s}</div>`).join('')}</div>
      ${r.step < steps.length ? `<button class="btn btn-g btn-xs" style="margin-top:10px" onclick="nextStep('${r.id}', ${r.step})">✔️ 簽名 ${steps[r.step]}</button>` : '<span class="badge b-green">已完成</span>'}
    </div>`;
  }).join('');

  document.getElementById('rTbl').innerHTML = exp.map(r => `<tr><td>${r.date}</td><td>${r.desc}</td><td>${r.amount}</td><td>${r.payer}</td><td>${r.fund}</td><td>${r.lastSigner || '-'}</td><td>${r.lastSignDate || '-'}</td></tr>`).join('');
}

window.bulkApprove = async () => {
  const checks = document.querySelectorAll('.bulk-check:checked');
  if(!checks.length) return alert("請先勾選項目");
  for(let c of checks) {
    const id = c.dataset.id, rec = allRecords.find(r => r.id === id);
    if(rec.step < (rec.isCoLearn ? 3 : 6) && rec.status === 'active') await nextStep(id, rec.step);
  }
};

window.go = (id) => {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[onclick="go('${id}')"]`); if(btn) btn.classList.add('active');
};
window.signOut = () => fbSignOut(auth).then(() => location.reload());
</script>
</body>
</html>
